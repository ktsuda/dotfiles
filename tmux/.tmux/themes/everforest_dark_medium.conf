# tokyonight-storm colors for tmux

set -g mode-style "fg=#a7c080,bg=#232a2e"

set -g message-style "fg=#a7c080,bg=#232a2e"
set -g message-command-style "fg=#a7c080,bg=#232a2e"

set -g pane-border-style "fg=#232a2e"
set -g pane-active-border-style "fg=#a7c080"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#a7c080,bg=#232a2e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "\
#[fg=#232a2e,bg=#a7c080,bold] #S \
#[fg=#a7c080,bg=#232a2e,nobold,nounderscore,noitalics]"
set -g status-right "\
#[fg=#425047,bg=#232a2e,nobold,nounderscore,noitalics]\
#[fg=#a7c080,bg=#425047]#{prefix_highlight}\
#[fg=#3d484d,bg=#425047,nobold,nounderscore,noitalics]\
#[fg=#a7c080,bg=#3d484d] %Y-%m-%d  %I:%M %p \
#[fg=#a7c080,bg=#3d484d,nobold,nounderscore,noitalics]\
#[fg=#232a2e,bg=#a7c080,bold] #h "

setw -g window-status-activity-style "underscore,fg=#d3c6aa,bg=#232a2e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#d3c6aa,bg=#232a2e"
setw -g window-status-format "\
#[fg=#232a2e,bg=#343f44,nobold,nounderscore,noitalics]\
#[fg=#d3c6aa,bg=#343f44] #I  #W \
#[fg=#343f44,bg=#232a2e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "\
#[fg=#232a2e,bg=#425047,nobold,nounderscore,noitalics]\
#[fg=#a7c080,bg=#425047] #I  #W \
#[fg=#425047,bg=#232a2e,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "\
#[fg=#e69875]#[bg=#425047]#[fg=#425047]#[bg=#e69875] "
set -g @prefix_highlight_output_suffix " "

# vim: set ft=tmux :
