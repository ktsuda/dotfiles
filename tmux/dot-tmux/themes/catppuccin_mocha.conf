# Some basic mocha colors.
set -g @ctp_base "#1e1e2e"
set -g @ctp_surface_0 "#313244"
set -g @ctp_surface_1 "#45475a"
set -g @ctp_surface_2 "#585b70"
set -g @ctp_fg "#cdd6f4"
set -g @ctp_mauve "#c6a0f6"
set -g @ctp_crust "#181926"

set -gF mode-style "fg=#{@ctp_mauve},bg=#{@ctp_base}"

set -gF message-style "fg=#{@ctp_mauve},bg=#{@ctp_base}"
set -gF message-command-style "fg=#{@ctp_mauve},bg=#{@ctp_base}"

set -g pane-border-style "fg=#{@ctp_base}"
set -g pane-active-border-style "fg=#{@ctp_mauve}"

set -g status "on"
set -g status-justify "left"

set -gF status-style "bg=#{@ctp_base},fg=#{@ctp_fg}"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "\
#[fg=#{@ctp_fg},bg=#{@ctp_surface_0}]#S \
#[fg=#{@ctp_surface_0},bg=#{@ctp_base},nobold,nounderscore,noitalics]"
set -g status-right "\
#[fg=#{@ctp_fg},bg=#{@ctp_surface_2}]#{prefix_highlight}\
#[fg=#{@ctp_surface_1},bg=#{@ctp_base},nobold,nounderscore,noitalics]\
#[fg=#{@ctp_fg},bg=#{@ctp_surface_1}] %Y-%m-%d \
#[fg=#{@ctp_base},bg=#{@ctp_surface_1},nobold,nounderscore,noitalics]\
#[fg=#{@ctp_surface_1},bg=#{@ctp_base},nobold,nounderscore,noitalics]\
#[fg=#{@ctp_fg},bg=#{@ctp_surface_1}] %I:%M %p \
#[fg=#{@ctp_base},bg=#{@ctp_surface_1},nobold,nounderscore,noitalics]\
#[fg=#{@ctp_surface_0},bg=#{@ctp_base},nobold,nounderscore,noitalics]\
#[fg=#{@ctp_fg},bg=#{@ctp_surface_0}] #h"

setw -g window-status-activity-style "underscore,fg=#{@ctp_mauve},bg=#{@ctp_base}"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#{@ctp_mauve},bg=#{@ctp_base}"
setw -gF window-status-format "\
#[fg=#{@ctp_base},bg=#{@ctp_surface_2},nobold,nounderscore,noitalics]\
#[fg=#{@ctp_fg},bg=#{@ctp_surface_2}] ##I \
#[fg=#{@ctp_base},bg=#{@ctp_surface_2}]\
#[fg=#{@ctp_fg},bg=#{@ctp_surface_2}] ##W ##F \
#[fg=#{@ctp_surface_2},bg=#{@ctp_base},nobold,nounderscore,noitalics]"
setw -g window-status-current-format "\
#[fg=#{@ctp_crust},bg=#{@ctp_mauve},nobold,nounderscore,noitalics]\
#[fg=#{@ctp_crust},bg=#{@ctp_mauve}] #I  #W #F \
#[fg=#{@ctp_mauve},bg=#{@ctp_crust},nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "\
#[fg=#{@ctp_surface_2}]#[bg=#{@ctp_base}]#[fg=#{@ctp_base}]#[bg=#{@ctp_surface_2}] "
set -g @prefix_highlight_output_suffix " "

# vim: set ft=tmux :
